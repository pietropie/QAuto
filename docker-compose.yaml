# docker-compose.yaml — deploy no Coolify

services:

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  api:
    build: .
    restart: always
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_BASE_URL=${APP_BASE_URL}
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENV=${ENV:-production}
      - PORT=8000
    volumes:
      - reports_data:/app/reports
      - screenshots_data:/app/screenshots
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "api.py"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks:
      - default
      - coolify

  worker:
    build: .
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_BASE_URL=${APP_BASE_URL}
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - reports_data:/app/reports
      - screenshots_data:/app/screenshots
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["python", "worker.py"]
    shm_size: '2gb'
    networks:
      - default

volumes:
  redis_data:
  reports_data:
  screenshots_data:

networks:
  default:
  coolify:
    external: true
