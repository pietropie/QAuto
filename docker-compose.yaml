# docker-compose.yaml
# Deploy no Coolify:
#   1. New Resource > Docker Compose > aponte para este repo
#   2. Configure as variaveis em Environment Variables:
#      APP_BASE_URL, APP_USERNAME, APP_PASSWORD, OPENAI_API_KEY
#   3. Coolify cuida do dominio e SSL automaticamente

services:

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: always
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_BASE_URL=${APP_BASE_URL}
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ENV=${ENV:-production}
      - PORT=8000
    volumes:
      - reports_data:/app/reports
      - screenshots_data:/app/screenshots
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "api.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - APP_BASE_URL=${APP_BASE_URL}
      - APP_USERNAME=${APP_USERNAME}
      - APP_PASSWORD=${APP_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - reports_data:/app/reports
      - screenshots_data:/app/screenshots
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    command: ["python", "worker.py"]
    shm_size: '2gb'

volumes:
  redis_data:
  reports_data:
  screenshots_data:
